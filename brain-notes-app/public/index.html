<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brain-Friendly Notes ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Architects+Daughter&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root {
  --bg:#fdf6ec;--bg2:#fef9f2;--card:#fff;--border:#e8ddd0;--text:#2a2010;--muted:#8a7a60;
  --accent:#f5a623;--accent2:#e8913a;--yellow:#ffe168;--yellow-bg:#fffbe6;
  --green:#c8f5d0;--green-bg:#f0fff4;--blue:#c8e8ff;--blue-bg:#f0f8ff;
  --pink:#ffd6e7;--pink-bg:#fff5f8;--purple:#e8d6ff;--purple-bg:#faf5ff;
  --orange:#ffe3c8;--orange-bg:#fff8f2;
  --shadow:4px 4px 0px #e0d0b8;--shadow-sm:2px 2px 0px #e0d0b8;--radius:16px;
}
[data-theme="dark"] {
  --bg:#1a1610;--bg2:#201c14;--card:#2a2418;--border:#3a3020;--text:#f0e8d8;--muted:#a09070;
  --accent:#f5a623;--accent2:#e8913a;--yellow:#a07800;--yellow-bg:#2a2400;
  --green:#0a5020;--green-bg:#0a1e10;--blue:#083060;--blue-bg:#080e1e;
  --pink:#60182a;--pink-bg:#1e0810;--purple:#381860;--purple-bg:#100818;
  --orange:#602008;--orange-bg:#1e0c04;
  --shadow:4px 4px 0px #100c06;--shadow-sm:2px 2px 0px #100c06;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s;}
.hidden{display:none!important;}
.topbar{background:var(--card);border-bottom:2px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.logo{font-family:'Architects Daughter',cursive;font-size:1.4rem;color:var(--accent);display:flex;align-items:center;gap:8px;}
.topbar-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.topbar-btn{background:var(--bg2);border:2px solid var(--border);border-radius:30px;padding:6px 14px;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;font-size:.85rem;color:var(--text);display:flex;align-items:center;gap:6px;transition:all .2s;}
.topbar-btn:hover{border-color:var(--accent);color:var(--accent);}
.user-email{font-size:.78rem;color:var(--muted);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;}
.mcard{background:var(--card);border:2px solid var(--border);border-radius:20px;padding:32px 28px;max-width:440px;width:100%;box-shadow:var(--shadow);animation:popIn .2s ease;}
@keyframes popIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
.mtitle{font-family:'Architects Daughter',cursive;font-size:1.5rem;color:var(--accent);text-align:center;margin-bottom:6px;}
.msub{text-align:center;color:var(--muted);font-size:.88rem;margin-bottom:20px;line-height:1.5;}
.mtabs{display:flex;gap:8px;margin-bottom:18px;}
.mtab{flex:1;padding:9px;border:2px solid var(--border);border-radius:10px;background:var(--bg2);font-family:'Nunito',sans-serif;font-weight:700;font-size:.9rem;cursor:pointer;color:var(--muted);transition:all .15s;}
.mtab.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.minput{width:100%;padding:12px 16px;border:2px solid var(--border);border-radius:10px;font-family:'Nunito',sans-serif;font-size:.95rem;color:var(--text);background:var(--bg2);margin-bottom:12px;transition:border-color .2s;display:block;}
.minput:focus{outline:none;border-color:var(--accent);}
.mbtn{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-family:'Architects Daughter',cursive;font-size:1.1rem;cursor:pointer;box-shadow:0 4px 0 var(--accent2);transition:all .15s;margin-bottom:10px;display:block;}
.mbtn.ghost{background:var(--bg2);color:var(--text);box-shadow:none;border:2px solid var(--border);}
.merr{background:var(--pink-bg);border:1.5px solid var(--pink);border-radius:8px;padding:10px 12px;font-size:.84rem;color:var(--text);margin-bottom:10px;}
.mok{background:var(--green-bg);border:1.5px solid var(--green);border-radius:8px;padding:10px 12px;font-size:.84rem;color:var(--text);margin-bottom:10px;}
.mlink{text-align:center;font-size:.83rem;color:var(--accent);cursor:pointer;font-weight:700;display:block;margin-top:4px;}
.mselect{width:100%;padding:12px 16px;border:2px solid var(--border);border-radius:10px;font-family:'Nunito',sans-serif;font-size:.95rem;color:var(--text);background:var(--bg2);margin-bottom:12px;display:block;}

#notes-panel{position:fixed;top:0;right:-400px;width:360px;height:100vh;background:var(--card);border-left:2px solid var(--border);z-index:400;transition:right .3s ease;box-shadow:-4px 0 20px rgba(0,0,0,.12);display:flex;flex-direction:column;}
#notes-panel.open{right:0;}
.panel-header{padding:18px 20px;border-bottom:2px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.panel-title{font-family:'Architects Daughter',cursive;font-size:1.1rem;color:var(--accent);}
.panel-close{background:none;border:2px solid var(--border);border-radius:30px;padding:4px 12px;cursor:pointer;font-weight:700;color:var(--muted);}
.panel-body{flex:1;overflow-y:auto;padding:16px;}
.folder-group{margin-bottom:18px;}
.folder-label{font-weight:800;font-size:.88rem;color:var(--muted);margin-bottom:8px;}
.note-item{background:var(--bg2);border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:8px;}
.note-info{flex:1;min-width:0;}
.note-item-title{font-size:.88rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.note-del{background:none;border:none;cursor:pointer;color:var(--muted);padding:4px 6px;}

.main{max-width:860px;margin:0 auto;padding:32px 20px 80px;}
.upload-section{background:var(--card);border:2px solid var(--border);border-radius:var(--radius);padding:28px;margin-bottom:24px;box-shadow:var(--shadow);}
.section-label{font-family:'Architects Daughter',cursive;font-size:1.1rem;color:var(--accent);margin-bottom:16px;}
.drop-zone{border:3px dashed var(--accent);border-radius:12px;padding:36px 24px;text-align:center;cursor:pointer;background:var(--yellow-bg);position:relative;}
.drop-zone input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer;}
.drop-icon{font-size:2.5rem;}
.drop-text{font-weight:700;}
.divider-or{text-align:center;color:var(--muted);font-weight:700;font-size:.85rem;margin:16px 0;position:relative;}
.divider-or::before,.divider-or::after{content:'';position:absolute;top:50%;width:40%;height:1px;background:var(--border);}
.divider-or::before{left:0;}.divider-or::after{right:0;}
textarea{width:100%;min-height:130px;border:2px solid var(--border);border-radius:12px;padding:14px 16px;font-family:'Nunito',sans-serif;background:var(--bg2);resize:vertical;}
.file-preview{background:var(--green-bg);border:1.5px solid var(--green);border-radius:10px;padding:10px 14px;margin-top:12px;font-weight:700;display:none;}
.file-preview.visible{display:flex;}
.gen-btn{width:100%;padding:16px;background:var(--accent);color:#fff;border:none;border-radius:14px;font-family:'Architects Daughter',cursive;font-size:1.2rem;cursor:pointer;box-shadow:0 4px 0 var(--accent2);margin-top:18px;}

.loading-box{background:var(--card);border:2px solid var(--border);border-radius:var(--radius);padding:40px 28px;text-align:center;margin-bottom:24px;}
.spinner{width:48px;height:48px;border:5px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg);}}

.output-section{animation:fadeIn .4s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.output-topbar{display:flex;align-items:center;justify-content:between;margin-bottom:16px;}
#notes-render{background:var(--bg2);border:2px solid var(--border);border-radius:var(--radius);padding:28px 24px;}
#notes-render h1{font-family:'Architects Daughter',cursive;font-size:1.8rem;text-align:center;margin-bottom:28px;}
#notes-render .n-section{background:var(--card);border:2px solid var(--border);border-radius:14px;padding:20px 22px;margin-bottom:20px;}
#notes-render .n-section-title{font-size:1.05rem;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
#notes-render .n-chunk{border-left:4px solid var(--accent);background:var(--yellow-bg);padding:10px 14px;border-radius:0 10px 10px 0;margin-bottom:12px;line-height:1.6;}
#notes-render .n-box{border-radius:10px;padding:12px 14px;margin-top:10px;}
#notes-render .n-box.yellow{background:var(--yellow-bg);border:1.5px dashed var(--accent);}
#notes-render .n-highlight{background:var(--yellow);padding:1px 4px;border-radius:4px;font-weight:700;}
#notes-render .n-pause{text-align:center;font-family:'Architects Daughter',cursive;font-size:.82rem;background:var(--yellow);display:block;width:fit-content;margin:6px auto 18px;padding:4px 16px;border-radius:20px;}
#notes-render .n-vocab-item{background:var(--purple-bg);border:1.5px solid var(--purple);border-radius:10px;padding:9px 13px;margin-bottom:8px;}
#notes-render .n-vocab-term{font-weight:800;color:#6a2ab5;}

#explain-tooltip{position:fixed;z-index:9999;background:var(--card);border:2.5px solid var(--accent);border-radius:12px;display:none;width:280px;box-shadow:0 8px 24px rgba(0,0,0,.18);}
#explain-tooltip-trigger{padding:10px 16px;cursor:pointer;font-weight:800;background:var(--yellow-bg);border:none;width:100%;text-align:left;}
#explain-panel{position:fixed;bottom:0;left:0;right:0;z-index:9998;background:var(--card);border-top:3px solid var(--accent);max-height:55vh;overflow-y:auto;box-shadow:0 -4px 24px rgba(0,0,0,.15);}
.explain-inner{max-width:860px;margin:0 auto;padding:20px 24px 32px;}
.explain-hdr{display:flex;justify-content:space-between;margin-bottom:14px;}

.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:10px 24px;border-radius:30px;font-weight:700;z-index:9999;}
</style>
</head>
<body>

<div class="overlay" id="auth-overlay">
  <div class="mcard" id="auth-card">
    <div id="view-login">
      <div class="mtitle">🧠 Brain-Friendly Notes</div>
      <div class="msub">Sign in to save and access your notes</div>
      <div class="mtabs">
        <button class="mtab active" id="tab-in" onclick="setTab('in')">Sign In</button>
        <button class="mtab" id="tab-up" onclick="setTab('up')">Sign Up</button>
      </div>
      <div class="merr hidden" id="auth-err"></div>
      <div class="mok hidden" id="auth-ok"></div>
      <input class="minput" type="email" id="auth-email" placeholder="Email address" />
      <input class="minput" type="password" id="auth-pass" placeholder="Password (min 6 characters)" />
      <button class="mbtn" id="auth-submit-btn" onclick="doAuth()">Sign In</button>
      <span class="mlink" onclick="skipAuth()">Skip for now</span>
    </div>
  </div>
</div>

<div class="overlay hidden" id="save-overlay">
  <div class="mcard">
    <div class="mtitle">💾 Save Your Notes</div>
    <div class="merr hidden" id="save-err"></div>
    <input class="minput" type="text" id="save-title" placeholder="Note title" />
    <select class="mselect" id="save-folder-sel"></select>
    <div id="new-folder-wrap" class="hidden"><input class="minput" type="text" id="new-folder-name" placeholder="New folder name" /></div>
    <span class="mlink" onclick="toggleNewFolder()">+ Create new folder</span>
    <button class="mbtn" onclick="doSaveNotes()" style="margin-top:14px;">💾 Save Notes</button>
    <button class="mbtn ghost" onclick="hide('save-overlay')">Cancel</button>
  </div>
</div>

<div class="topbar">
  <div class="logo">🧠 Brain-Friendly Notes</div>
  <div class="topbar-actions">
    <button class="topbar-btn hidden" id="btn-my-notes" onclick="openNotesPanel()">📁 My Notes</button>
    <button class="topbar-btn hidden" id="btn-signout" onclick="doSignOut()">Sign Out</button>
    <button class="topbar-btn" onclick="toggleDark()"><span id="theme-icon">🌙</span></button>
  </div>
</div>

<div id="notes-panel">
  <div class="panel-header"><div class="panel-title">📁 Saved Notes</div><button class="panel-close" onclick="closeNotesPanel()">✕</button></div>
  <div class="panel-body" id="panel-body">Loading...</div>
</div>

<div class="main">
  <div class="upload-section" id="upload-section">
    <div class="section-label">📂 Step 1 — Add Your Content</div>
    <div class="drop-zone" id="drop-zone">
      <input type="file" id="file-input" accept=".pdf,.docx,.txt" />
      <div class="drop-icon">📄</div>
      <div class="drop-text">Drop a file or click to browse</div>
    </div>
    <div class="file-preview hidden" id="file-preview"><span id="file-name-lbl"></span><button onclick="clearFile()">✕</button></div>
    
    <div class="divider-or">OR PASTE A LINK</div>
    <input class="minput" id="url-input" type="url" placeholder="https://wikipedia.org/article..." style="margin-bottom: 10px;">
    
    <div class="divider-or">OR</div>
    <textarea id="paste-input" placeholder="Paste your text here..."></textarea>
    <div class="err-box hidden" id="gen-err"></div>
    <button class="gen-btn" id="gen-btn" onclick="generateNotes()">✨ Turn Into Brain-Friendly Notes</button>
  </div>

  <div class="loading-box hidden" id="loading-box"><div class="spinner"></div><div class="loading-text">Making your notes...</div></div>

  <div class="output-section hidden" id="output-section">
    <div class="output-topbar">
      <button class="mbtn" id="save-btn" onclick="openSaveModal()">💾 Save</button>
      <button class="mbtn ghost" onclick="resetApp()">✏️ New Notes</button>
    </div>
    <div id="notes-render"></div>
  </div>
</div>

<div id="explain-tooltip"><button id="explain-tooltip-trigger" onclick="openExplainPanel()">💡 Explain this</button></div>
<div id="explain-panel" class="hidden">
  <div class="explain-inner">
    <div class="explain-hdr"><div class="explain-title">💡 Explanation</div><button onclick="hide('explain-panel')">✕</button></div>
    <div id="explain-body"></div>
  </div>
</div>

<script>
const SB_URL = 'https://epagtlrtzwdvferumowx.supabase.co';
const SB_KEY = 'sb_publishable_JLHb8iewqq_RbrmZc5dmHg_KmNRSRra';
const db = window.supabase.createClient(SB_URL, SB_KEY);

let currentUser = null, currentHTML = '', selectedFile = null, selectedText = '', dark = false;

(async function initAuth() {
  const { data: { session } } = await db.auth.getSession();
  if (session?.user) onSignedIn(session.user);
  db.auth.onAuthStateChange((_e, session) => { if (session?.user) onSignedIn(session.user); });
})();

function onSignedIn(user) { currentUser = user; hide('auth-overlay'); show('btn-my-notes'); show('btn-signout'); }
function doSignOut() { db.auth.signOut(); location.reload(); }
function skipAuth() { hide('auth-overlay'); }
function show(id) { document.getElementById(id)?.classList.remove('hidden'); }
function hide(id) { document.getElementById(id)?.classList.add('hidden'); }
function val(id) { return document.getElementById(id)?.value || ''; }
function toggleDark() { dark = !dark; document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light'); }

async function extractText() {
  if (selectedFile) {
    const ext = selectedFile.name.split('.').pop().toLowerCase();
    if (ext === 'txt') return await selectedFile.text();
    if (ext === 'docx') { const ab = await selectedFile.arrayBuffer(); return (await mammoth.extractRawText({arrayBuffer:ab})).value; }
    if (ext === 'pdf') return new Promise((res) => { const r = new FileReader(); r.onload=()=>res(r.result); r.readAsDataURL(selectedFile); });
  }
  return val('paste-input').trim();
}

async function generateNotes() {
  hide('gen-err');
  const urlVal = val('url-input').trim();
  let raw = '';
  if (!urlVal) { try { raw = await extractText(); if(!raw) throw new Error("Add content first"); } catch(e) { showErr('gen-err', e.message); return; } }

  show('loading-box');
  try {
    const payload = urlVal ? { targetUrl: urlVal } : { messages: [{role:'user', content: raw}] };
    const resp = await fetch('/.netlify/functions/claude', { method:'POST', body: JSON.stringify({
      model: 'claude-3-5-sonnet-20241022', max_tokens: 6000, system: SYSTEM_PROMPT, ...payload
    })});
    const data = await resp.json();
    let html = data.content[0].text;
    const fence = html.match(/```(?:html)?\s*([\s\S]*?)```/i);
    currentHTML = fence ? fence[1].trim() : html;
    document.getElementById('notes-render').innerHTML = currentHTML;
    show('output-section');
  } catch(e) { showErr('gen-err', e.message); } finally { hide('loading-box'); }
}

const SYSTEM_PROMPT = `Expert ADHD tutor. Return ONLY HTML. Use classes: .n-section, .n-chunk, .n-box.yellow, .n-highlight. End with .n-vocab recap.`;

async function openExplainPanel() {
  show('explain-panel');
  document.getElementById('explain-body').innerHTML = "Loading...";
  try {
    const resp = await fetch('/.netlify/functions/claude', { method:'POST', body: JSON.stringify({
      model: 'claude-3-5-haiku-20241022', messages: [{role:'user', content: `Explain: ${selectedText}`}]
    })});
    const data = await resp.json();
    document.getElementById('explain-body').innerHTML = data.content[0].text;
  } catch(e) { document.getElementById('explain-body').innerHTML = "Error loading explanation."; }
}

// Selection logic
document.addEventListener('mouseup', () => {
  const sel = window.getSelection().toString().trim();
  if (sel.length > 2) {
    selectedText = sel;
    show('explain-tooltip');
    const rect = window.getSelection().getRangeAt(0).getBoundingClientRect();
    document.getElementById('explain-tooltip').style.top = (rect.top + window.scrollY - 40) + "px";
    document.getElementById('explain-tooltip').style.left = rect.left + "px";
  } else { hide('explain-tooltip'); }
});

function handleFile(f) { selectedFile = f; document.getElementById('file-name-lbl').textContent = f.name; show('file-preview'); }
document.getElementById('file-input').addEventListener('change', (e) => handleFile(e.target.files[0]));
function clearFile() { selectedFile = null; hide('file-preview'); }
function showErr(id, m) { const el = document.getElementById(id); el.textContent = m; el.classList.remove('hidden'); }
function resetApp() { location.reload(); }
</script>
</body>
</html>
