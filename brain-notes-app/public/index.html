<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brain-Friendly Notes ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Architects+Daughter&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root {
  --bg:#fdf6ec;--bg2:#fef9f2;--card:#fff;--border:#e8ddd0;--text:#2a2010;--muted:#8a7a60;
  --accent:#f5a623;--accent2:#e8913a;--yellow:#ffe168;--yellow-bg:#fffbe6;
  --green:#c8f5d0;--green-bg:#f0fff4;--blue:#c8e8ff;--blue-bg:#f0f8ff;
  --pink:#ffd6e7;--pink-bg:#fff5f8;--purple:#e8d6ff;--purple-bg:#faf5ff;
  --orange:#ffe3c8;--orange-bg:#fff8f2;
  --shadow:4px 4px 0px #e0d0b8;--shadow-sm:2px 2px 0px #e0d0b8;--radius:16px;
}
[data-theme="dark"] {
  --bg:#1a1610;--bg2:#201c14;--card:#2a2418;--border:#3a3020;--text:#f0e8d8;--muted:#a09070;
  --accent:#f5a623;--accent2:#e8913a;--yellow:#a07800;--yellow-bg:#2a2400;
  --green:#0a5020;--green-bg:#0a1e10;--blue:#083060;--blue-bg:#080e1e;
  --pink:#60182a;--pink-bg:#1e0810;--purple:#381860;--purple-bg:#100818;
  --orange:#602008;--orange-bg:#1e0c04;
  --shadow:4px 4px 0px #100c06;--shadow-sm:2px 2px 0px #100c06;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s;}

/* ── UTILS ── */
.hidden{display:none!important;}

/* ── TOPBAR ── */
.topbar{background:var(--card);border-bottom:2px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.logo{font-family:'Architects Daughter',cursive;font-size:1.4rem;color:var(--accent);display:flex;align-items:center;gap:8px;}
.topbar-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.topbar-btn{background:var(--bg2);border:2px solid var(--border);border-radius:30px;padding:6px 14px;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;font-size:.85rem;color:var(--text);display:flex;align-items:center;gap:6px;transition:all .2s;}
.topbar-btn:hover{border-color:var(--accent);color:var(--accent);}
.user-email{font-size:.78rem;color:var(--muted);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* ── MODAL OVERLAY ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;}
.overlay.hidden{display:none!important;}
.mcard{background:var(--card);border:2px solid var(--border);border-radius:20px;padding:32px 28px;max-width:440px;width:100%;box-shadow:var(--shadow);animation:popIn .2s ease;}
@keyframes popIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
.mtitle{font-family:'Architects Daughter',cursive;font-size:1.5rem;color:var(--accent);text-align:center;margin-bottom:6px;}
.msub{text-align:center;color:var(--muted);font-size:.88rem;margin-bottom:20px;line-height:1.5;}
.mtabs{display:flex;gap:8px;margin-bottom:18px;}
.mtab{flex:1;padding:9px;border:2px solid var(--border);border-radius:10px;background:var(--bg2);font-family:'Nunito',sans-serif;font-weight:700;font-size:.9rem;cursor:pointer;color:var(--muted);transition:all .15s;}
.mtab.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.minput{width:100%;padding:12px 16px;border:2px solid var(--border);border-radius:10px;font-family:'Nunito',sans-serif;font-size:.95rem;color:var(--text);background:var(--bg2);margin-bottom:12px;transition:border-color .2s;display:block;}
.minput:focus{outline:none;border-color:var(--accent);}
.minput::placeholder{color:var(--muted);}
.mbtn{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-family:'Architects Daughter',cursive;font-size:1.1rem;cursor:pointer;box-shadow:0 4px 0 var(--accent2);transition:all .15s;margin-bottom:10px;display:block;}
.mbtn:hover{transform:translateY(-2px);box-shadow:0 6px 0 var(--accent2);}
.mbtn:active{transform:translateY(2px);box-shadow:0 2px 0 var(--accent2);}
.mbtn:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.mbtn.ghost{background:var(--bg2);color:var(--text);box-shadow:none;border:2px solid var(--border);}
.mbtn.ghost:hover{border-color:var(--accent);color:var(--accent);transform:none;box-shadow:none;}
.merr{background:var(--pink-bg);border:1.5px solid var(--pink);border-radius:8px;padding:10px 12px;font-size:.84rem;color:var(--text);margin-bottom:10px;line-height:1.5;}
.mok{background:var(--green-bg);border:1.5px solid var(--green);border-radius:8px;padding:10px 12px;font-size:.84rem;color:var(--text);margin-bottom:10px;line-height:1.5;}
.mlink{text-align:center;font-size:.83rem;color:var(--accent);cursor:pointer;font-weight:700;display:block;margin-top:4px;}
.mlink:hover{text-decoration:underline;}
.mselect{width:100%;padding:12px 16px;border:2px solid var(--border);border-radius:10px;font-family:'Nunito',sans-serif;font-size:.95rem;color:var(--text);background:var(--bg2);margin-bottom:12px;display:block;}
.mselect:focus{outline:none;border-color:var(--accent);}

/* ── NOTES PANEL (slide-in) ── */
#notes-panel{position:fixed;top:0;right:-400px;width:360px;height:100vh;background:var(--card);border-left:2px solid var(--border);z-index:400;transition:right .3s ease;box-shadow:-4px 0 20px rgba(0,0,0,.12);display:flex;flex-direction:column;}
#notes-panel.open{right:0;}
.panel-header{padding:18px 20px;border-bottom:2px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.panel-title{font-family:'Architects Daughter',cursive;font-size:1.1rem;color:var(--accent);}
.panel-close{background:none;border:2px solid var(--border);border-radius:30px;padding:4px 12px;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;font-size:.8rem;color
